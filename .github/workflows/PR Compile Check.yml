name: PR Compile Check

on:
  pull_request:

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile with Maven Wrapper
        run: ./mvnw --no-transfer-progress --batch-mode --show-version --errors compile

  unit-test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests with coverage
        run: ./mvnw --no-transfer-progress --batch-mode --show-version --errors test

      - name: Upload coverage reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-reports
          path: '**/target/site/jacoco/'
          if-no-files-found: warn

      - name: Add coverage comment to PR
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/helmx-common/target/site/jacoco/jacoco.xml,
            ${{ github.workspace }}/helmx-system/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '📊 Java Test Coverage Report'
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0
